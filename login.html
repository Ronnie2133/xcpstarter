<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login – Kitchen Costing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', system-ui, sans-serif; background: #f4f5f7; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { background: #fff; border: 1px solid #e4e6ea; border-radius: 16px; padding: 40px 36px; width: 360px; box-shadow: 0 4px 12px rgba(0,0,0,.08); }
    .login-logo { font-size: 32px; margin-bottom: 6px; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .sub { color: #9198a8; font-size: 13px; margin-bottom: 24px; }
    label { font-size: 12px; font-weight: 600; color: #5a5f6e; display: block; margin-bottom: 4px; }
    input { width: 100%; padding: 10px 12px; border: 1px solid #e4e6ea; border-radius: 8px; font-family: inherit; font-size: 14px; margin-bottom: 14px; }
    input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
    button { width: 100%; padding: 10px; background: #2563eb; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; margin-top: 4px; }
    button:hover { opacity: .9; }
    .flash { background: #eff4ff; border: 1px solid #bfdbfe; color: #1d4ed8; padding: 9px 12px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">🍳</div>
    <h1>Kitchen Costing</h1>
    <p class="sub">Sign in to your kitchen dashboard</p>
    {% with messages = get_flashed_messages() %}
      {% if messages %}{% for m in messages %}<div class="flash">{{ m }}</div>{% endfor %}{% endif %}
    {% endwith %}
    <form method="post">
      <label>Username</label>
      <input type="text" name="username" autocomplete="username" required>
      <label>Password</label>
      <input type="password" name="password" autocomplete="current-password" required>
      <button type="submit">Sign In</button>
    </form>
  </div>
</body>
</html>
