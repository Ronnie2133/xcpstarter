<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login - Kitchen Costing</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f4f5f7; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .box { background: #fff; border: 1px solid #e4e6ea; border-radius: 16px; padding: 40px 36px; width: 360px; box-shadow: 0 4px 12px rgba(0,0,0,.08); }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; color: #1a1d23; }
    .sub { color: #9198a8; font-size: 13px; margin-bottom: 24px; margin-top: 4px; }
    label { font-size: 12px; font-weight: 600; color: #5a5f6e; display: block; margin-bottom: 4px; margin-top: 14px; }
    input { width: 100%; padding: 10px 12px; border: 1px solid #e4e6ea; border-radius: 8px; font-family: inherit; font-size: 14px; }
    input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
    button { width: 100%; padding: 10px; background: #2563eb; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; margin-top: 20px; }
    button:hover { background: #1d4ed8; }
    .flash { background: #eff4ff; border: 1px solid #bfdbfe; color: #1d4ed8; padding: 9px 12px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Kitchen Costing</h1>
    <p class="sub">Sign in to continue</p>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for msg in messages %}
          <div class="flash">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <form method="post">
      <label for="username">Username</label>
      <input id="username" type="text" name="username" autocomplete="username" required>
      <label for="password">Password</label>
      <input id="password" type="password" name="password" autocomplete="current-password" required>
      <button type="submit">Sign In</button>
    </form>
  </div>
</body>
</html>
